<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Shabeel Sulaiman's Logbook - Patient Management System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Animated Styles -->
    <link rel="stylesheet" href="animated-styles.css">
</head>
<body>
    <!-- Authentication Check -->
    <script>
        // Check if user is authenticated
        if (sessionStorage.getItem('authenticated') !== 'true') {
            window.location.href = 'login.html';
        }
        
        // Logout function
        function logout() {
            sessionStorage.removeItem('authenticated');
            window.location.href = 'login.html';
        }
        
        // Prevent back button after logout
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || sessionStorage.getItem('authenticated') !== 'true') {
                window.location.href = 'login.html';
            }
        });
    </script>
    
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-clipboard2-pulse me-2"></i>
                Dr. Shabeel Sulaiman's Logbook
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#add-patient">
                            <i class="bi bi-person-plus me-1"></i>Add Patient
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#patient-records">
                            <i class="bi bi-people me-1"></i>Records
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="window.print()">
                            <i class="bi bi-printer me-1"></i>Print
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-warning" href="#" onclick="logout()">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Add Patient Section -->
        <section id="add-patient" class="mb-5">
            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <div class="card shadow patient-record">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-person-plus-fill me-2"></i>
                                Add New Patient
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="patientForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="patientName" class="form-label">
                                            <i class="bi bi-person me-1"></i>Patient Name *
                                        </label>
                                        <input type="text" class="form-control" id="patientName" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="patientAge" class="form-label">
                                            <i class="bi bi-calendar me-1"></i>Age *
                                        </label>
                                        <input type="number" class="form-control" id="patientAge" min="0" max="150" required>
                                    </div>
                                </div>
                                
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="patientGender" class="form-label">
                                            <i class="bi bi-gender me-1"></i>Gender *
                                        </label>
                                        <select class="form-select" id="patientGender" required>
                                            <option value="">Select Gender</option>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="patientPhone" class="form-label">
                                            <i class="bi bi-telephone me-1"></i>Phone Number
                                        </label>
                                        <input type="tel" class="form-control" id="patientPhone">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="patientEmail" class="form-label">
                                        <i class="bi bi-envelope me-1"></i>Email
                                    </label>
                                    <input type="email" class="form-control" id="patientEmail">
                                </div>

                                <div class="mb-3">
                                    <label for="visitDate" class="form-label">
                                        <i class="bi bi-calendar-check me-1"></i>Visit Date *
                                    </label>
                                    <input type="date" class="form-control" id="visitDate" required>
                                </div>

                                <div class="mb-3">
                                    <label for="chiefComplaint" class="form-label">
                                        <i class="bi bi-chat-left-text me-1"></i>Chief Complaint *
                                    </label>
                                    <textarea class="form-control" id="chiefComplaint" rows="3" required></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="diagnosis" class="form-label">
                                        <i class="bi bi-clipboard2-pulse me-1"></i>Diagnosis
                                    </label>
                                    <textarea class="form-control" id="diagnosis" rows="3"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="treatment" class="form-label">
                                        <i class="bi bi-prescription me-1"></i>Treatment Plan
                                    </label>
                                    <textarea class="form-control" id="treatment" rows="3"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="notes" class="form-label">
                                        <i class="bi bi-journal-text me-1"></i>Additional Notes
                                    </label>
                                    <textarea class="form-control" id="notes" rows="2"></textarea>
                                </div>

                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <button type="reset" class="btn btn-secondary">
                                        <i class="bi bi-arrow-clockwise me-1"></i>Reset
                                    </button>
                                    <button type="submit" class="btn btn-success">
                                        <i class="bi bi-save me-1"></i>Save Patient
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Patient Records Section -->
        <section id="patient-records" class="mb-5">
            <div class="row">
                <div class="col-12">
                    <div class="card shadow patient-record">
                        <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">
                                <i class="bi bi-people-fill me-2"></i>
                                Patient Records
                            </h5>
                            <div class="d-flex gap-2">
                                <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search patients...">
                                <button class="btn btn-light btn-sm" onclick="loadPatients()">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover" id="patientsTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Date</th>
                                            <th>Name</th>
                                            <th>Age</th>
                                            <th>Gender</th>
                                            <th>Phone</th>
                                            <th>Complaint</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="patientsTableBody">
                                        <!-- Patient records will be loaded here -->
                                    </tbody>
                                </table>
                            </div>
                            <div id="noRecords" class="text-center text-muted py-4" style="display: none;">
                                <i class="bi bi-inbox fs-1"></i>
                                <p class="mt-2">No patient records found</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-check-circle me-2"></i>Success
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="successMessage">Patient record saved successfully!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Patient Details Modal -->
    <div class="modal fade" id="patientModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-person-badge me-2"></i>Patient Details
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="patientDetails">
                    <!-- Patient details will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="printPatientRecord()">
                        <i class="bi bi-printer me-1"></i>Print Record
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
